<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 650" width="900" height="650" font-family="Arial, sans-serif" font-size="13">

  <!-- White background -->
  <rect width="900" height="650" fill="white"/>

  <!-- ══════════════════════════════════════════════════════ -->
  <!-- ROW 1: (a) (b) (c) (d) -->
  <!-- ══════════════════════════════════════════════════════ -->

  <!-- ─── (a) Normal tree, flat ground ─── -->
  <line x1="10" y1="195" x2="200" y2="195" stroke="black" stroke-width="2.5"/>
  <rect x="65" y="70" width="60" height="125" fill="#c8c8c8" stroke="black" stroke-width="1.5"/>
  <line x1="45" y1="90" x2="145" y2="90" stroke="black" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="148" y1="90" x2="148" y2="195" stroke="black" stroke-width="1.5"/>
  <polygon points="148,90 144,102 152,102" fill="black"/>
  <polygon points="148,195 144,183 152,183" fill="black"/>
  <text x="152" y="148" font-size="12" fill="black">1.3 m</text>
  <text x="95" y="220" text-anchor="middle" font-size="14" fill="black">(a)</text>

  <!-- ─── (b) Tree on slope ─── -->
  <line x1="210" y1="205" x2="430" y2="165" stroke="black" stroke-width="2.5"/>
  <polygon points="278,68 334,68 340,205 272,205" fill="#c8c8c8" stroke="black" stroke-width="1.5"/>
  <line x1="258" y1="88" x2="358" y2="88" stroke="black" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="355" y1="88" x2="355" y2="205" stroke="black" stroke-width="1.5"/>
  <polygon points="355,88 351,100 359,100" fill="black"/>
  <polygon points="355,205 351,193 359,193" fill="black"/>
  <text x="359" y="152" font-size="12" fill="black">1.3 m</text>
  <text x="315" y="230" text-anchor="middle" font-size="14" fill="black">(b)</text>

  <!-- ─── (c) Concave slope ─── -->
  <path d="M440,205 Q510,232 600,192" fill="none" stroke="black" stroke-width="2.5"/>
  <polygon points="494,68 550,68 556,205 488,205" fill="#c8c8c8" stroke="black" stroke-width="1.5"/>
  <line x1="470" y1="88" x2="574" y2="88" stroke="black" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="570" y1="88" x2="570" y2="205" stroke="black" stroke-width="1.5"/>
  <polygon points="570,88 566,100 574,100" fill="black"/>
  <polygon points="570,205 566,193 574,193" fill="black"/>
  <text x="574" y="152" font-size="12" fill="black">1.3 m</text>
  <text x="514" y="250" text-anchor="middle" font-size="14" fill="black">(c)</text>

  <!-- ─── (d) Leaning tree ─── -->
  <line x1="620" y1="205" x2="880" y2="205" stroke="black" stroke-width="2.5"/>
  <!-- leaning trunk polygon -->
  <polygon points="700,62 736,72 718,205 682,205" fill="#c8c8c8" stroke="black" stroke-width="1.5"/>
  <!-- shaded top cut showing non-standard section -->
  <polygon points="700,62 736,72 736,92 700,82" fill="#aaa" stroke="black" stroke-width="1"/>
  <!-- 1.3m vertical arrow beside trunk -->
  <line x1="664" y1="110" x2="664" y2="205" stroke="black" stroke-width="1.5"/>
  <polygon points="664,110 660,122 668,122" fill="black"/>
  <polygon points="664,205 660,193 668,193" fill="black"/>
  <!-- dashed horizontal from measure point to trunk -->
  <line x1="664" y1="110" x2="700" y2="110" stroke="black" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="628" y="165" font-size="12" fill="black">1.3 m</text>
  <text x="750" y="230" text-anchor="middle" font-size="14" fill="black">(d)</text>

  <!-- ══════════════════════════════════════════════════════ -->
  <!-- ROW 2: (e) (f) -->
  <!-- ══════════════════════════════════════════════════════ -->

  <!-- ─── (e) Swelling / irregular trunk at DBH ─── -->
  <line x1="60" y1="450" x2="320" y2="450" stroke="black" stroke-width="2.5"/>
  <!-- trunk with bulge/swelling in middle -->
  <path d="M140,270 L152,270 C158,305 170,328 174,355 C179,372 179,388 174,405 C168,425 156,436 152,450
           L128,450 C124,436 112,425 106,405 C101,388 101,372 106,355 C110,328 122,305 128,270 Z"
        fill="#c8c8c8" stroke="black" stroke-width="1.5"/>
  <!-- dotted "Measure here" line above swelling -->
  <line x1="100" y1="308" x2="200" y2="308" stroke="black" stroke-width="1.8" stroke-dasharray="5,3"/>
  <text x="203" y="304" font-size="12" fill="black">Measure here</text>
  <!-- 1.3m arrow at normal DBH height (where swelling is) -->
  <line x1="222" y1="380" x2="222" y2="450" stroke="black" stroke-width="1.5"/>
  <polygon points="222,380 218,392 226,392" fill="black"/>
  <polygon points="222,450 218,438 226,438" fill="black"/>
  <line x1="176" y1="380" x2="222" y2="380" stroke="black" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="225" y="422" font-size="12" fill="black">1.3 m</text>
  <text x="180" y="475" text-anchor="middle" font-size="14" fill="black">(e)</text>

  <!-- ─── (f) Buttress roots on slope ─── -->
  <line x1="370" y1="450" x2="620" y2="405" stroke="black" stroke-width="2.5"/>
  <!-- main trunk -->
  <polygon points="450,270 494,270 500,420 444,425" fill="#c8c8c8" stroke="black" stroke-width="1.5"/>
  <!-- left buttress -->
  <path d="M450,368 Q428,395 422,420" fill="none" stroke="black" stroke-width="9" stroke-linecap="round"/>
  <!-- right buttress -->
  <path d="M494,364 Q514,390 520,408" fill="none" stroke="black" stroke-width="9" stroke-linecap="round"/>
  <!-- "Measure here" dotted line above buttress -->
  <line x1="432" y1="322" x2="512" y2="322" stroke="black" stroke-width="1.8" stroke-dasharray="5,3"/>
  <text x="375" y="318" font-size="11" fill="black">Measure</text>
  <text x="380" y="331" font-size="11" fill="black">here</text>
  <!-- +30 cm bracket -->
  <line x1="530" y1="322" x2="545" y2="322" stroke="black" stroke-width="1.2"/>
  <line x1="530" y1="363" x2="545" y2="363" stroke="black" stroke-width="1.2"/>
  <line x1="538" y1="322" x2="538" y2="363" stroke="black" stroke-width="1.5"/>
  <polygon points="538,322 534,334 542,334" fill="black"/>
  <polygon points="538,363 534,351 542,351" fill="black"/>
  <text x="548" y="348" font-size="11" fill="black">+ 30 cm</text>
  <!-- >1.0m bracket -->
  <line x1="530" y1="363" x2="545" y2="363" stroke="black" stroke-width="1.2"/>
  <line x1="530" y1="420" x2="545" y2="420" stroke="black" stroke-width="1.2"/>
  <line x1="538" y1="363" x2="538" y2="420" stroke="black" stroke-width="1.5"/>
  <text x="548" y="397" font-size="11" fill="black">&gt; 1.0 m</text>
  <text x="490" y="475" text-anchor="middle" font-size="14" fill="black">(f)</text>

  <!-- ══════════════════════════════════════════════════════ -->
  <!-- "Trees with multiple stems" title -->
  <!-- ══════════════════════════════════════════════════════ -->
  <text x="450" y="502" text-anchor="middle" font-size="14" font-weight="bold" fill="black" text-decoration="underline">Trees with multiple stems</text>

  <!-- ══════════════════════════════════════════════════════ -->
  <!-- ROW 3: (g) (h) -->
  <!-- ══════════════════════════════════════════════════════ -->

  <!-- ─── (g) Stems join BELOW 1.3m ─── -->
  <line x1="20" y1="630" x2="310" y2="630" stroke="black" stroke-width="2.5"/>
  <!-- base single trunk -->
  <polygon points="110,560 176,560 180,630 106,630" fill="#c8c8c8" stroke="black" stroke-width="1.5"/>
  <!-- left stem above join -->
  <polygon points="108,518 140,518 142,562 106,562" fill="#c8c8c8" stroke="black" stroke-width="1.5"/>
  <!-- right stem above join -->
  <polygon points="144,518 178,518 180,562 142,562" fill="#c8c8c8" stroke="black" stroke-width="1.5"/>
  <!-- dotted "Measure here" line (below join on single trunk) -->
  <line x1="88" y1="580" x2="188" y2="580" stroke="black" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="30" y="575" font-size="11" fill="black">Measure</text>
  <text x="35" y="589" font-size="11" fill="black">here</text>
  <!-- 1.3m arrow -->
  <line x1="200" y1="580" x2="200" y2="630" stroke="black" stroke-width="1.5"/>
  <polygon points="200,580 196,592 204,592" fill="black"/>
  <polygon points="200,630 196,618 204,618" fill="black"/>
  <text x="204" y="612" font-size="12" fill="black">1.3 m</text>
  <text x="165" y="652" text-anchor="middle" font-size="14" fill="black">(g)</text>

  <!-- ─── (h) Stems fork BEFORE 1.3m — measure each separately ─── -->
  <line x1="420" y1="630" x2="900" y2="630" stroke="black" stroke-width="2.5"/>
  <!-- left stem (slight lean left) -->
  <polygon points="504,510 536,510 530,630 498,630" fill="#c8c8c8" stroke="black" stroke-width="1.5"/>
  <!-- middle stem (straight) -->
  <polygon points="648,510 680,510 678,630 650,630" fill="#c8c8c8" stroke="black" stroke-width="1.5"/>
  <!-- right stem (slight lean right) -->
  <polygon points="790,510 822,510 828,630 786,630" fill="#c8c8c8" stroke="black" stroke-width="1.5"/>

  <!-- left stem 1.3m -->
  <line x1="478" y1="557" x2="478" y2="630" stroke="black" stroke-width="1.5"/>
  <polygon points="478,557 474,569 482,569" fill="black"/>
  <polygon points="478,630 474,618 482,618" fill="black"/>
  <line x1="478" y1="557" x2="502" y2="557" stroke="black" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="445" y="600" font-size="12" fill="black">1.3 m</text>

  <!-- middle stem 1.3m -->
  <line x1="622" y1="557" x2="622" y2="630" stroke="black" stroke-width="1.5"/>
  <polygon points="622,557 618,569 626,569" fill="black"/>
  <polygon points="622,630 618,618 626,618" fill="black"/>
  <line x1="622" y1="557" x2="648" y2="557" stroke="black" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="589" y="600" font-size="12" fill="black">1.3 m</text>

  <!-- right stem 1.3m -->
  <line x1="764" y1="557" x2="764" y2="630" stroke="black" stroke-width="1.5"/>
  <polygon points="764,557 760,569 768,569" fill="black"/>
  <polygon points="764,630 760,618 768,618" fill="black"/>
  <line x1="764" y1="557" x2="788" y2="557" stroke="black" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="731" y="600" font-size="12" fill="black">1.3 m</text>

  <text x="660" y="652" text-anchor="middle" font-size="14" fill="black">(h)</text>

</svg>
